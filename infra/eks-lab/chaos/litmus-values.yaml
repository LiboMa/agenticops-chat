# LitmusChaos Helm values
# Chart: litmuschaos/litmus
# Docs: https://docs.litmuschaos.io/

# Portal (ChaosCenter web UI)
portal:
  server:
    service:
      type: ClusterIP
  frontend:
    service:
      type: ClusterIP
      # Access via: kubectl port-forward svc/litmus-frontend -n chaos-testing 9091:9091
      # Then SSH tunnel: ssh -L 9091:localhost:9091 ubuntu@<bastion>

# MongoDB for ChaosCenter state (Bitnami subchart)
mongodb:
  architecture: replicaset
  replicaCount: 3
  persistence:
    enabled: true
    storageClass: gp3
    size: 20Gi
  arbiter:
    persistence:
      storageClass: gp3

# Resource limits
portalScope: cluster
