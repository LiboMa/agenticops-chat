apiVersion: v1
kind: Pod
metadata:
  name: agenticops-disk-filler
  namespace: online-boutique
  labels:
    chaos-injected: "true"
    agenticops-scenario: case-4
spec:
  nodeSelector:
    role: workload
  tolerations:
    - operator: Exists
  containers:
    - name: filler
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Filling disk with 70G file on host path..."
          fallocate -l 70G /data/fill || dd if=/dev/zero of=/data/fill bs=1M count=71680
          echo "Disk fill complete. Sleeping forever..."
          while true; do sleep 3600; done
      volumeMounts:
        - name: fill-vol
          mountPath: /data
      resources:
        requests:
          cpu: 10m
          memory: 256Mi
        limits:
          cpu: 100m
          memory: 256Mi
  volumes:
    - name: fill-vol
      hostPath:
        path: /var/chaos-disk-fill
        type: DirectoryOrCreate
  restartPolicy: Always
