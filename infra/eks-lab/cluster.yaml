# eksctl cluster configuration for AgenticOps lab environment
# Usage: eksctl create cluster -f cluster.yaml
#
# Security: All nodes in private subnets (no public IPs).
# Access: kubectl via bastion SSH or SSM. Node access via SSM only.
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: agenticops-lab
  region: ap-southeast-1
  version: "1.30"

# Use existing bastion VPC — same VPC so AlertManager can reach bastion:8000
vpc:
  id: vpc-028fe79b3785c1aba
  subnets:
    private:
      ap-southeast-1a:
        id: subnet-0634feb8477a666fa  # project Private 1 (10.0.101.0/24)
      ap-southeast-1b:
        id: subnet-0b68d4f84d93abc26  # project Private 2 (10.0.102.0/24)
      ap-southeast-1c:
        id: subnet-0265c17a51f71d02c  # project Private 3 (10.0.103.0/24)
    public:
      ap-southeast-1a:
        id: subnet-0528a9eddeb9f8f78  # project Public 1 (10.0.1.0/24) — bastion here
      ap-southeast-1b:
        id: subnet-0ba6596ade21d766c  # project Public 2 (10.0.2.0/24)
      ap-southeast-1c:
        id: subnet-04200dc193bde143b  # project Public 3 (10.0.4.0/24)

iam:
  withOIDC: true

addons:
  - name: vpc-cni
    version: latest
  - name: coredns
    version: latest
  - name: kube-proxy
    version: latest
  - name: aws-ebs-csi-driver
    version: latest
    wellKnownPolicies:
      ebsCSIController: true

managedNodeGroups:
  - name: workload
    instanceType: m5.large
    desiredCapacity: 3
    minSize: 2
    maxSize: 5
    volumeSize: 80
    volumeType: gp3
    privateNetworking: true  # Nodes in private subnets — no public IPs
    ssh:
      allow: true
      publicKeyName: key-malibo-sa  # SSH only reachable via SSM or bastion in same VPC
    labels:
      role: workload
    iam:
      attachPolicyARNs:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
    tags:
      environment: lab
      project: agenticops

  - name: monitoring
    instanceType: m5.large
    desiredCapacity: 2
    minSize: 2
    maxSize: 3
    volumeSize: 100
    volumeType: gp3
    privateNetworking: true  # Nodes in private subnets — no public IPs
    labels:
      role: monitoring
    taints:
      - key: dedicated
        value: monitoring
        effect: NoSchedule
    iam:
      attachPolicyARNs:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
    tags:
      environment: lab
      project: agenticops

cloudWatch:
  clusterLogging:
    enableTypes:
      - api
      - audit
      - authenticator
      - controllerManager
      - scheduler
