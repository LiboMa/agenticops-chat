# kube-prometheus-stack Helm values
# Chart: prometheus-community/kube-prometheus-stack
# Docs: https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack

prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          storageClassName: gp3
          resources:
            requests:
              storage: 50Gi
    # Schedule on monitoring nodes
    nodeSelector:
      role: monitoring
    tolerations:
      - key: dedicated
        operator: Equal
        value: monitoring
        effect: NoSchedule
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: "2"
        memory: 4Gi
    # Enable remote write endpoint for OTEL Collector
    enableRemoteWriteReceiver: true
    # Auto-discover ServiceMonitors across all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

grafana:
  enabled: true
  service:
    type: ClusterIP
    # Access via: kubectl port-forward svc/prometheus-grafana -n monitoring 3000:80
    # Then SSH tunnel: ssh -L 3000:localhost:3000 ubuntu@<bastion>
  adminPassword: "agenticops-lab"  # Change in production
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: gp3
  nodeSelector:
    role: monitoring
  tolerations:
    - key: dedicated
      operator: Equal
      value: monitoring
      effect: NoSchedule
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
  # Default K8s dashboards are included via kube-prometheus-stack
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: utc

alertmanager:
  alertmanagerSpec:
    nodeSelector:
      role: monitoring
    tolerations:
      - key: dedicated
        operator: Equal
        value: monitoring
        effect: NoSchedule
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
  config:
    global:
      resolve_timeout: 5m
    receivers:
      - name: "null"
      - name: agenticops
        webhook_configs:
          # AgenticOps API on bastion host — replace <BASTION_PRIVATE_IP> with actual VPC IP.
          # AlertManager Pod and bastion are in the same VPC, so internal traffic only.
          - url: "http://<BASTION_PRIVATE_IP>:8000/api/webhooks/alert/prometheus"
            send_resolved: true
    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: agenticops
      routes:
        # Silence Watchdog (always-firing health check alert)
        - matchers:
            - alertname = "Watchdog"
          receiver: "null"
        # Critical alerts: short group wait for faster response
        - matchers:
            - severity = "critical"
          group_wait: 10s
          group_interval: 1m
          repeat_interval: 1h
          receiver: agenticops
  # Load custom PrometheusRule from alert-rules.yaml
  # (applied via additionalPrometheusRulesMap below)

# Custom alert rules for AgenticOps incident scenarios
additionalPrometheusRulesMap:
  agenticops-rules:
    groups:
      - name: agenticops.rules
        rules: []  # Actual rules defined in alert-rules.yaml (applied as separate PrometheusRule CR)

# Node exporter runs on ALL nodes (DaemonSet)
nodeExporter:
  enabled: true

# kube-state-metrics on monitoring nodes
kube-state-metrics:
  nodeSelector:
    role: monitoring
  tolerations:
    - key: dedicated
      operator: Equal
      value: monitoring
      effect: NoSchedule

# Prometheus operator on monitoring nodes
prometheusOperator:
  nodeSelector:
    role: monitoring
  tolerations:
    - key: dedicated
      operator: Equal
      value: monitoring
      effect: NoSchedule
