apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: chaos-lab
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        location /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        location /api {
            proxy_pass http://backend:6379;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }
    }
